<!DOCTYPE html>
<html>
<head>
    <title>Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 15px;
        }

        button {
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            font-size: 20px;
            border-radius: 10px;
            border: none;
            background: black;
            color: white;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>

<body>

<h2>Uitteam</h2>
<input placeholder="Uit team" oninput="awayName=this.value; send()">

<h2>Score</h2>
<button onclick="home++; send()">+1 Thuis</button>
<button onclick="away++; send()">+1 Uit</button>

<h2>Thuisgoal</h2>
<select id="scorer"></select>
<button onclick="goalHome()">Goal Laren</button>

<h2>Timer</h2>
<button onclick="startFirst()">Start 1e helft</button>
<button onclick="rust()">Rust</button>
<button onclick="startSecond()">Start 2e helft</button>
<button onclick="stop()">Stop</button>

<h2>Wedstrijd</h2>
<button onclick="resetMatch()">Reset</button>

<h2>Logo uitteam</h2>
<input type="file" onchange="upload(event, 'away')">

<h2>Sponsor</h2>
<input type="file" onchange="upload(event, 'sponsor')">

<h2>Opstelling</h2>

<div id="lineupInputs"></div>

<h2>Wissels</h2>
<div id="subInputs"></div>

<button onclick="saveLineup()">Opslaan opstelling</button>

<h2>Scherm</h2>
<button onclick="showDisplay()">Scorebord</button>
<button onclick="showLineup()">Opstelling</button>

<script>
const socket = io({
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 1000
});

socket.on("update", data => {
    // Sync all variables with server state
    home = data.home;
    away = data.away;

    homeName = data.homeName;
    awayName = data.awayName;

    homeLogo = data.homeLogo;
    awayLogo = data.awayLogo;
    sponsor = data.sponsor;

    currentTime = data.time;
    currentExtra = data.extra;

    const sel = document.getElementById("scorer");

    let current = sel.value;   // 👈 onthoud keuze

    sel.innerHTML = "";

    data.lineup.forEach(p => {

        const opt = document.createElement("option");

        opt.value = p.name;
        opt.text = p.nr + " " + p.name;

        if(p.name === current){
            opt.selected = true;
        }

        sel.appendChild(opt);
    });

    // Voeg subs toe
    data.subs.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.name;
        opt.text = p.nr + " " + p.name + " (sub)";
        if(p.name === current) opt.selected = true;
        sel.appendChild(opt);
    });
});

let home = 0;
let away = 0;
let homeName = "SV Laren '99";
let awayName = "Tegenstander";

let homeLogo = "";
let awayLogo = "";
let sponsor = "";

let currentTime = "00:00";
let currentExtra = 0;

let lineup = [];
let subs = [];

function makeInputs() {

    const l = document.getElementById("lineupInputs");
    const s = document.getElementById("subInputs");

    const positions = ["K","LB","CV","CV","RB","CM","CVM","CM","LB","RB","SP"];

    for (let i=0;i<11;i++) {
        l.innerHTML += `
            <div style="margin-bottom:10px;">
                <strong>${positions[i]}</strong><br>
                <input placeholder="Nr" id="nr${i}">
                <input placeholder="Naam" id="name${i}">
            </div>
        `;
    }

    for (let i=0;i<5;i++) {
        s.innerHTML += `
            <input placeholder="Nr" id="subnr${i}">
            <input placeholder="Naam" id="subname${i}">
        `;
    }
}

makeInputs();

function saveLineup(){

    lineup = [];
    subs = [];

    for (let i=0;i<11;i++){
        lineup.push({
            nr: document.getElementById("nr"+i).value,
            name: document.getElementById("name"+i).value
        });
    }

    for (let i=0;i<5;i++){
        subs.push({
            nr: document.getElementById("subnr"+i).value,
            name: document.getElementById("subname"+i).value
        });
    }

    socket.emit("save_lineup", { lineup, subs });
}

function goalHome(){
    const player = document.getElementById("scorer").value;
    socket.emit("goal_home", { player });
}

function send(extra = currentExtra, time = currentTime) {
    currentTime = time;
    currentExtra = extra;

    socket.emit("update", {
        home, away,
        time: currentTime,
        extra: currentExtra,
        homeLogo, awayLogo,
        homeName, awayName,
        sponsor
    });
}

function showLineup(){
    socket.emit("show_lineup");
}

function showDisplay(){
    socket.emit("show_display");
}

function resetMatch(){
    socket.emit("reset_match");
}

function upload(event, type) {
    const reader = new FileReader();

    reader.onload = function() {
        if (type === "home") homeLogo = reader.result;
        if (type === "away") awayLogo = reader.result;
        if (type === "sponsor") sponsor = reader.result;
        send();
    };

    reader.readAsDataURL(event.target.files[0]);
}

function startFirst() {
    socket.emit("start_first");
}

function startSecond() {
    socket.emit("start_second");
}

function stop() {
    socket.emit("stop_timer");
}

function rust() {
    socket.emit("rust");
}
</script>

</body>
</html>
