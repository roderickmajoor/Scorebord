<!DOCTYPE html>
<html>

<head>

<title>Sponsors</title>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<style>

html,body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    background:black;

    overflow:hidden;

}


video{

    width:100vw;
    height:100vh;

    object-fit:cover;

}

</style>

</head>


<body>


<video
    id="sponsorVideo"
    autoplay
    muted
    loop>

    <source src="/static/sponsors.mp4" type="video/mp4">

</video>



<script>

const socket = io();


socket.on("update", data => {

    if(data.screen === "sponsors"){

        document.getElementById("sponsorVideo").currentTime = 0;
        document.getElementById("sponsorVideo").play();

    }

});


</script>


</body>

</html>
