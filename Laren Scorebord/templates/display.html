<!DOCTYPE html>
<html>
<head>
    <title>Scorebord</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-rows: 1fr 1.5fr 1fr;
            height: 100vh;
            text-align: center;
        }

        .timer {
            font-size: 90px;
        }

        .extra-time {
            font-size: 45px;
            opacity: 0.7;
            display: none;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
        }

        .team-name {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .team img {
            width: 220px;
            height: 220px;
            object-fit: contain;
        }

        .score {
            font-size: 140px;
            font-weight: bold;
            letter-spacing: 20px;
        }

        .bottomRow {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-start; /* scrollers kunnen naar beneden overlappen */
            padding: 10px 20px;
            height: 250px; /* vast hoogte zodat de sponsor div niet verschuift */
        }

        .scorers {
            position: absolute; /* overlay positie */
            top: 0; /* start bovenaan de bottomRow */
            left: 8%; /* links uitlijnen met de home column */
            width: 220px; /* zelfde breedte als het logo */
            color: white;
            font-size: 30px;
            text-align: left;
            overflow: visible; /* mag overlopen naar onder */
            z-index: 1;
        }

        .sponsor {
            position: relative; /* zodat scorers niet over de sponsor valt */
            z-index: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .sponsor img {
            width: 250px;
            height: 200px;
            object-fit: contain;
            background: white;       /* 👈 zichtbaar op zwart */
            padding: 1px;
            border-radius: 0px;
        }

        /* 🔥 Goal flash effect */
        .flash {
            animation: flashAnim 0.5s ease-in-out 3;
        }

        @keyframes flashAnim {
            0% { background: white; color: black; }
            100% { background: black; color: white; }
        }
    </style>
</head>

<body>
<div id="displayScreen">
    <div id="main" class="container">

        <div class="timerBlock">
            <div class="timer" id="timer">00:00</div>
            <div class="extra-time" id="extra">+0</div>
        </div>

        <div class="scoreboard">
            <div class="team">
                <div class="team-name" id="homeName">SV Laren '99</div>
                <img id="homeLogo" src="">
            </div>

            <div class="score" id="score">0 - 0</div>

            <div class="team">
                <div class="team-name" id="awayName">Uit</div>
                <img id="awayLogo" src="">
            </div>
        </div>

        <!-- ⭐ NIEUW -->
        <div class="bottomRow">

            <div id="scorers" class="scorers"></div>

            <div class="sponsor">
                <img id="sponsorImg" src="">
            </div>

        </div>

    </div>
</div>

<iframe id="lineupFrame"
        src="/lineup"
        style="position:absolute;left:0;width:100%;height:100%;border:0;display:none;overflow: hidden;box-sizing: border-box;">
</iframe>

<script>
const socket = io();
let lastHomeScore = 0;

socket.on("update", data => {

    const scorers = document.getElementById("scorers");
    scorers.innerHTML = "";

    let map = {};

    data.goals.forEach(g => {

        if(!map[g.player]) map[g.player] = [];

        map[g.player].push(g.minute);
    });

    Object.keys(map).forEach(name => {

        let mins = map[name].join("' ") + "'";

        scorers.innerHTML += `<div>${mins} ${name}</div>`;
    });

    if(data.screen === "lineup"){
        document.getElementById("displayScreen").style.display = "none";
        document.getElementById("lineupFrame").style.display = "block";
    }else{
        document.getElementById("displayScreen").style.display = "block";
        document.getElementById("lineupFrame").style.display = "none";
    }

    document.getElementById("homeName").innerText = data.homeName;
    document.getElementById("awayName").innerText = data.awayName;

    document.getElementById("score").innerText =
        data.home + " - " + data.away;

    document.getElementById("timer").innerText = data.time;

    const extraEl = document.getElementById("extra");

    if (data.extra && data.extra !== "00:00") {
        extraEl.style.display = "block";
        extraEl.innerText = "+" + data.extra;
    } else {
        extraEl.style.display = "none";
    }

    if (data.homeLogo) {
        document.getElementById("homeLogo").src = data.homeLogo;
    }

    if (data.awayLogo) {
        document.getElementById("awayLogo").src = data.awayLogo;
    }

    if (data.sponsor) {
        document.getElementById("sponsorImg").src = data.sponsor;
    }

    /* 🔥 Flash bij goal thuis */
    if (data.home > lastHomeScore) {
        const el = document.getElementById("main");
        el.classList.add("flash");

        setTimeout(() => el.classList.remove("flash"), 1500);
    }

    lastHomeScore = data.home;
});
</script>

</body>
</html>
